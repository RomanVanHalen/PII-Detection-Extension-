<!DOCTYPE html>
<html>
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 360px;
            min-height: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(180deg, #0F172A 0%, #1E293B 100%);
            color: #E2E8F0;
        }
        
        .container {
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 400px;
        }
        
        .header {
            margin-bottom: 40px;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3B82F6 0%, #1E40AF 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 16px;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: #F1F5F9;
            letter-spacing: -0.5px;
        }
        
        .header-subtitle {
            font-size: 12px;
            color: #94A3B8;
            margin-top: 4px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        
        .stats-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(30, 64, 175, 0.05) 100%);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 36px 24px;
            text-align: center;
            backdrop-filter: blur(10px);
            margin-bottom: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .stats-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .count {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #60A5FA 0%, #3B82F6 50%, #1E40AF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }
        
        .label {
            font-size: 12px;
            color: #94A3B8;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .stats-info {
            font-size: 11px;
            color: #64748B;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(59, 130, 246, 0.15);
        }
        
        .footer {
            display: flex;
            gap: 12px;
        }
        
        button {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        #clear-btn {
            background: rgba(148, 163, 184, 0.1);
            color: #CBD5E1;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        #clear-btn:hover {
            background: linear-gradient(135deg, #3B82F6 0%, #1E40AF 100%);
            color: #FFFFFF;
            border-color: #3B82F6;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
            transform: translateY(-2px);
        }
        
        #clear-btn:active {
            transform: translateY(0px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <div class="header">
                <div class="logo-section">
                    
                    <div>
                        <div class="header-title">PII Shield</div>
                    </div>
                </div>
                <div class="header-subtitle">Real-Time PII Protection</div>
            </div>
            
            <div class="stats-card">
                <span class="count" id="stat-count">0</span>
                <span class="label">Exposures Identified</span>
                <div class="stats-info">Data exposures detected on this page</div>
            </div>
        </div>
        
        <div class="footer">
            <button id="clear-btn">Clear History</button>
        </div>
    </div>
    
    <script type="module" src="popup.js"></script>
</body>
</html>
</html>
